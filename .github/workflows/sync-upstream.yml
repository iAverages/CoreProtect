name: Sync upstream

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

env:
  UPSTREAM_REPOSITORY: PlayPro/CoreProtect
  TARGET_BRANCH: master

jobs:
  sync:
    name: Merge upstream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN || github.token }}
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Add upstream remote
        run: git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
      - name: Fetch upstream
        run: git fetch upstream "${TARGET_BRANCH}"
      - name: Merge upstream
        run: git merge --no-edit "upstream/${TARGET_BRANCH}"
      - name: Push updates
        run: git push origin "HEAD:${TARGET_BRANCH}"
